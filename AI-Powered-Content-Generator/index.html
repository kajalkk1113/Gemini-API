<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gemini AI Tools</h1>
<div class="container">

<!-- Ask -->
<div class="card">
    <h2>Ask Me Anything</h2>
    <textarea id="askInput"></textarea>
    <button id="askBtn">Ask</button>
    <div id="askResult" class="output"></div>
</div>

<!-- Summarizer -->
<div class="card">
    <h2>Summarizer</h2>
    <textarea id="sumInput"></textarea>
    <button id="sumBtn">Summarize</button>
    <div id="sumResult" class="output"></div>
</div>

<!-- Ideas -->
<div class="card">
    <h2>Idea Generator</h2>
    <textarea id="ideaInput"></textarea>
    <button id="ideaBtn">Generate</button>
    <div id="ideaResult" class="output"></div>
</div>

<!-- Definition -->
<div class="card">
    <h2>Definition Finder</h2>
    <textarea id="defInput"></textarea>
    <button id="defBtn">Find</button>
    <div id="defResult" class="output"></div>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
