<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 AI Movie Magic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<style>
    /* Import Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

/* CSS Variables for easy theming */
:root {
    --primary-gradient: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    --secondary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.25);
    --shadow-xl: 0 35px 80px rgba(0, 0, 0, 0.3);
}

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* Animated Background Particles */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
    animation: float 20s ease-in-out infinite;
    z-index: -2;
}

body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #ff6b6b, transparent),
        radial-gradient(2px 2px at 40px 70px, #feca57, transparent),
        radial-gradient(1px 1px at 90px 40px, #48dbfb, transparent),
        radial-gradient(1px 1px at 130px 80px, #ff9ff3, transparent);
    background-repeat: repeat;
    background-size: 200px 100px;
    animation: sparkle 15s linear infinite;
    z-index: -1;
}

/* Main Container */
.container {
    position: relative;
    max-width: 700px;
    margin: 0 auto;
    padding: 60px 30px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Floating Card */
.main-card {
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    padding: 50px 40px;
    box-shadow: var(--shadow-xl);
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
}

.main-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.7s;
}

.main-card:hover::before {
    left: 100%;
}

.main-card:hover {
    transform: translateY(-15px) rotateX(5deg) rotateY(5deg);
    box-shadow: 0 45px 100px rgba(0, 0, 0, 0.4);
}

/* Title with 3D effect */
h1 {
    font-size: 3.5em;
    font-weight: 800;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-align: center;
    position: relative;
    filter: drop-shadow(0 10px 20px rgba(255, 107, 107, 0.3));
}

h1::after {
    content: '🎬✨';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.2em;
    animation: bounce 2s infinite;
}

/* Subtitle */
.subtitle {
    color: rgba(255, 255, 255, 0.8);
    font-size: 1.2em;
    font-weight: 300;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

/* Input with floating label */
.input-group {
    position: relative;
    margin-bottom: 30px;
    width: 100%;
}

#user-input {
    width: 100%;
    padding: 25px 30px;
    font-size: 18px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 25px;
    color: white;
    outline: none;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(10px);
}

#user-input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

#user-input:focus {
    border-color: #ff6b6b;
    box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
    transform: scale(1.02);
    background: rgba(255, 255, 255, 0.15);
}

.input-label {
    position: absolute;
    top: 25px;
    left: 30px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 18px;
    transition: all 0.3s ease;
    pointer-events: none;
}

#user-input:focus + .input-label,
#user-input:not(:placeholder-shown) + .input-label {
    top: -10px;
    left: 20px;
    font-size: 14px;
    color: #ff6b6b;
    font-weight: 500;
    background: var(--glass-bg);
    padding: 0 10px;
    border-radius: 10px;
}

/* Magical Button */
#btn {
    background: var(--primary-gradient);
    background-size: 300% 300%;
    border: none;
    padding: 22px 50px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    color: white;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
}

#btn:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 25px 50px rgba(255, 107, 107, 0.6);
    animation: gradientShift 3s ease infinite;
}

#btn:active {
    transform: translateY(-4px) scale(1.02);
}

/* Button magic effects */
.btn-glow {
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: var(--primary-gradient);
    opacity: 0;
    transition: opacity 0.3s;
}

#btn:hover .btn-glow {
    opacity: 0.3;
}

/* Result Card */
#result {
    margin-top: 40px;
    padding: 30px 40px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    min-height: 120px;
    width: 100%;
    color: white;
    font-size: 17px;
    line-height: 1.8;
    position: relative;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.6s ease;
}

#result.show {
    transform: translateY(0);
    opacity: 1;
}

/* Typing animation */
#result.typing::after {
    content: '|';
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
}

/* Responsive */
@media (max-width: 768px) {
    .main-card {
        padding: 40px 25px;
        margin: 20px;
    }
    
    h1 {
        font-size: 2.5em;
    }
    
    #user-input, #btn {
        padding: 20px 25px;
        font-size: 16px;
    }
}

/* Keyframe Animations */
@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(120deg); }
    66% { transform: translateY(20px) rotate(240deg); }
}

@keyframes sparkle {
    from { transform: translateY(0px) rotate(0deg); }
    to { transform: translateY(-100px) rotate(360deg); }
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
    40% { transform: translateX(-50%) translateY(-10px); }
    60% { transform: translateX(-50%) translateY(-5px); }
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>

    <div class="container">
        <div class="main-card">
            <h1>Movie Magic</h1>
            <p class="subtitle">Get instant summaries with AI ✨</p>
            
            <div class="input-group">
                <input type="text" id="user-input" placeholder=" ">
                <label class="input-label" for="user-input">Enter movie name...</label>
            </div>
            
            <button id="btn">
                <span class="btn-glow"></span>
                <span>🔮 Generate Summary</span>
            </button>
            
            <p id="result"></p>
        </div>
    </div>
    
    <script src="movie.js"></script>
</body>
</html>
